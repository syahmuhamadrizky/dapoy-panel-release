<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dapoy Panel</title>
    <link rel="stylesheet" href="/global.css?v=1781814016331">
    <style>
        body {
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-md);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .logo-title {
            color: var(--text-main);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .logo-subtitle {
            color: var(--text-muted);
            font-size: 13px;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            margin-top: 10px;
        }

        .error-message {
            background: var(--danger-bg);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message.show {
            display: flex;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon sidebar-brand-logo">🚀</div>
                <h1 class="logo-title sidebar-brand-h1">Dapoy Panel</h1>
                <p class="logo-subtitle sidebar-brand-p">Sistem Management Server</p>
            </div>

            <div class="error-message" id="errorMessage">
                <span>⚠️</span>
                <span id="errorText">Login gagal!</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-control" type="text" id="username" name="username" required placeholder="Masukkan username" autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" type="password" id="password" name="password" required placeholder="Masukkan password" autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-login" id="btnLogin">
                    Masuk ke Dashboard
                </button>
            </form>

            <div class="security-badge">
                <span class="text-success">🛡️</span>
                <span>Dilindungi dengan enkripsi SSL</span>
            </div>
        </div>

        <div class="login-footer">
            &copy; 2025 SMR Dapoy Panel. All rights reserved.
        </div>
    </div>

    <!-- Scripts -->
    <script>
        const form = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.remove('show');
            btnLogin.disabled = true;
            btnLogin.textContent = 'Memproses...';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    btnLogin.textContent = '✓ Berhasil!';
                    btnLogin.style.backgroundColor = 'var(--success)';
                    setTimeout(() => { window.location.href = data.redirect; }, 500);
                } else {
                    errorText.textContent = data.message || 'Login gagal!';
                    errorMessage.classList.add('show');
                    btnLogin.disabled = false;
                    btnLogin.textContent = 'Masuk ke Dashboard';
                }
            } catch (error) {
                errorText.textContent = 'Terjadi kesalahan. Silakan coba lagi.';
                errorMessage.classList.add('show');
                btnLogin.disabled = false;
                btnLogin.textContent = 'Masuk ke Dashboard';
            }
        });

        // App Identity Loader
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const res = await fetch('/api/system/settings');
                const data = await res.json();
                if(data.success) {
                    document.title = document.title.split('-')[0].trim() + ' - ' + data.appName;
                    const brandH1 = document.querySelector('.sidebar-brand-h1');
                    const brandP = document.querySelector('.sidebar-brand-p');
                    const brandLogo = document.querySelector('.sidebar-brand-logo');
                    if(brandH1) brandH1.textContent = data.appName;
                    if(brandP) brandP.textContent = data.appDomain;
                    if(brandLogo) {
                        if(data.appLogo.startsWith('http') || data.appLogo.startsWith('/') || data.appLogo.startsWith('data:image')) {
                            brandLogo.innerHTML = '<img src="' + data.appLogo + '" style="width:100%;height:100%;border-radius:8px;object-fit:cover;">';
                        } else {
                            brandLogo.textContent = data.appLogo;
                        }
                    }
                }
            } catch(e) {}
        });
    </script>
</body>
</html>
