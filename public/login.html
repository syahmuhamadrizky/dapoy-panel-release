<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dapoy Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        :root {
            --primary: #ef4444;
            --secondary: #3b82f6;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bg-animation .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.3), rgba(59, 130, 246, 0.3));
            animation: float 20s infinite;
        }

        .bg-animation .circle:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-animation .circle:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        .bg-animation .circle:nth-child(3) {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(50px, -50px) scale(1.1);
            }

            50% {
                transform: translate(0, -100px) scale(1);
            }

            75% {
                transform: translate(-50px, -50px) scale(0.9);
            }
        }

        /* Login Container */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ef4444 0%, #3b82f6 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            box-shadow: 0 10px 40px rgba(239, 68, 68, 0.4);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 10px 40px rgba(239, 68, 68, 0.4);
            }

            50% {
                box-shadow: 0 10px 60px rgba(239, 68, 68, 0.6);
            }
        }

        .logo-title {
            color: white;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 400;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            transition: all 0.3s;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .form-group input:focus {
            outline: none;
            border-color: #ef4444;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
        }

        .form-group input:focus+.input-icon {
            color: #ef4444;
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ef4444 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(239, 68, 68, 0.5);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Error Message */
        .error-message {
            background: rgba(255, 82, 82, 0.15);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff5252;
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            font-size: 14px;
            font-weight: 500;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s ease-in-out;
        }

        .error-message.show {
            display: flex;
        }

        .error-message .icon {
            font-size: 18px;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-10px);
            }

            40% {
                transform: translateX(10px);
            }

            60% {
                transform: translateX(-10px);
            }

            80% {
                transform: translateX(10px);
            }
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            margin-top: 24px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ef4444;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 32px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }

        .login-footer a {
            color: #ef4444;
            text-decoration: none;
            font-weight: 600;
        }

        /* Security Badge */
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        .security-badge .icon {
            color: #4caf50;
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">🚀</div>
                <h1 class="logo-title">Dapoy Panel</h1>
                <p class="logo-subtitle">Sistem Management Server</p>
            </div>

            <div class="error-message" id="errorMessage">
                <span class="icon">⚠️</span>
                <span id="errorText">Login gagal!</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" required placeholder="Masukkan username"
                            autocomplete="username">
                        <span class="input-icon">👤</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" required placeholder="Masukkan password"
                            autocomplete="current-password">
                        <span class="input-icon">🔒</span>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    Masuk ke Dashboard
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>

            <div class="security-badge">
                <span class="icon">🛡️</span>
                <span>Dilindungi dengan enkripsi SSL</span>
            </div>
        </div>

        <div class="login-footer">
            &copy; 2025 SMR Dapoy Panel. All rights reserved.
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Hide error
            errorMessage.classList.remove('show');

            // Show loading
            btnLogin.style.display = 'none';
            loading.classList.add('show');

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Success animation
                    btnLogin.textContent = '✓ Berhasil!';
                    btnLogin.style.background = 'linear-gradient(135deg, #4caf50 0%, #45a049 100%)';

                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 500);
                } else {
                    // Show error
                    errorText.textContent = data.message || 'Login gagal!';
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                errorText.textContent = 'Terjadi kesalahan. Silakan coba lagi.';
                errorMessage.classList.add('show');
            } finally {
                btnLogin.style.display = 'block';
                loading.classList.remove('show');
            }
        });
    </script>

    <script>
        // Global App Identity Loader
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const res = await fetch('/api/system/settings');
                const data = await res.json();
                if(data.success) {
                    document.title = document.title.split('-')[0].trim() + ' - ' + data.appName;
                    const brandH1 = document.querySelector('.sidebar-brand h1');
                    const brandP = document.querySelector('.sidebar-brand p');
                    const brandLogo = document.querySelector('.sidebar-brand .logo');
                    if(brandH1) brandH1.textContent = data.appName;
                    if(brandP) brandP.textContent = data.appDomain;
                    if(brandLogo) {
                        if(data.appLogo.startsWith('http') || data.appLogo.startsWith('/') || data.appLogo.startsWith('data:image')) {
                            brandLogo.innerHTML = '<img src="' + data.appLogo + '" style="width:100%;height:100%;border-radius:12px;object-fit:cover;">';
                        } else {
                            brandLogo.textContent = data.appLogo;
                        }
                    }
                }
            } catch(e) {}
        });
    </script>

<!-- DONATE MODAL -->
<div id="donateModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 99999; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div style="background: #1e293b; max-width: 400px; width: 90%; text-align: center; border-radius: 16px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);">
        <img src="logo.png" alt="Logo Dapoy" style="width: 80px; height: 80px; object-fit: cover; border-radius: 50%; margin-bottom: 16px; border: 2px solid #3b82f6; background: #0f172a;">
        <h2 style="margin-top: 0; color: #fff; font-family: sans-serif;">Support Dapoy Panel</h2>
        <p style="color: #94a3b8; margin-bottom: 20px; font-size: 14px; font-family: sans-serif; line-height: 1.5;">Dukung pengembangan panel ini dengan berdonasi via Gopay / Dana ke nomor berikut atas nama <strong>Syah Muhamad Rizky</strong></p>
        
        <div style="display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">
            <code style="font-size: 20px; color: #3b82f6; letter-spacing: 2px; font-weight: bold; margin-right: 15px;">087777999907</code>
            <button onclick="navigator.clipboard.writeText('087777999907'); this.innerText='Disalin!'; setTimeout(()=>this.innerText='Copy', 2000);" style="background: #3b82f6; color: #fff; padding: 6px 12px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold;">Copy</button>
        </div>
        
        <button onclick="document.getElementById('donateModal').style.display='none'" style="width: 100%; background: rgba(255,255,255,0.1); color: #fff; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">Tutup</button>
    </div>
</div>
<script>
function showDonateModal() {
    document.getElementById('donateModal').style.display = 'flex';
}
</script>

</body>

</html>
