<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivasi - Dapoy Panel</title>
    <link rel="stylesheet" href="/global.css?v=1781814016326">
    <style>
        body {
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-md);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .logo-title {
            color: var(--text-main);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .logo-subtitle {
            color: var(--danger);
            font-size: 13px;
            font-weight: 600;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            margin-top: 10px;
        }

        .error-message {
            background: var(--danger-bg);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message.show {
            display: flex;
        }

        .info-box {
            background: var(--warning-bg);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: #b45309;
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .security-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon sidebar-brand-logo">🚀</div>
                <h1 class="logo-title sidebar-brand-h1">Aktivasi Dapoy Panel</h1>
                <p class="logo-subtitle">Waktu Versi Free (2 Jam) Telah Habis</p>
            </div>

            <div class="info-box">
                Silakan masukkan <strong>License Key</strong> untuk melanjutkan penggunaan Dapoy Panel secara penuh (Premium).
            </div>

            <div class="error-message" id="errorMessage">
                <span>⚠️</span>
                <span id="errorText">Aktivasi gagal!</span>
            </div>

            <form id="activationForm">
                <div class="form-group">
                    <label class="form-label" for="license_key">License Key</label>
                    <input class="form-control" type="text" id="license_key" name="license_key" required placeholder="Contoh: DP-XXXX-XXXX-XXXX" autocomplete="off" style="text-transform: uppercase; font-family: monospace; letter-spacing: 1px;">
                </div>

                <button type="submit" class="btn btn-primary btn-login" id="btnActivate">
                    Aktivasi Sekarang
                </button>
            </form>

            <div class="security-badge">
                <p>Hardware ID (HWID):</p>
                <code id="hwidDisplay" style="color: var(--secondary); background: #f1f5f9; padding: 4px 8px; border-radius: 4px;">Memuat...</code>
            </div>
            
            <div class="security-badge" style="flex-direction: row; margin-top: 10px;">
                <span class="text-success">🛡️</span>
                <span>Dilindungi dengan enkripsi SSL</span>
            </div>
        </div>

        <div class="login-footer">
            &copy; 2025 SMR Dapoy Panel. All rights reserved.
        </div>
    </div>

    <!-- Scripts -->
    <script>
        const form = document.getElementById('activationForm');
        const btnActivate = document.getElementById('btnActivate');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const hwidDisplay = document.getElementById('hwidDisplay');

        // Fetch HWID
        fetch('/api/hwid').then(r => r.json()).then(data => {
            if(data.hwid) hwidDisplay.textContent = data.hwid;
        }).catch(() => hwidDisplay.textContent = 'Gagal memuat HWID');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.remove('show');
            btnActivate.disabled = true;
            btnActivate.textContent = 'Memproses...';

            const license_key = document.getElementById('license_key').value.trim();

            try {
                const response = await fetch('/api/activate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ license_key })
                });

                const data = await response.json();

                if (data.success || data.valid) {
                    btnActivate.textContent = '✅ Berhasil!';
                    btnActivate.style.backgroundColor = 'var(--success)';
                    setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
                } else {
                    errorText.textContent = data.message || data.error || 'Aktivasi gagal!';
                    errorMessage.classList.add('show');
                    btnActivate.disabled = false;
                    btnActivate.textContent = 'Aktivasi Sekarang';
                }
            } catch (error) {
                errorText.textContent = 'Terjadi kesalahan. Silakan coba lagi.';
                errorMessage.classList.add('show');
                btnActivate.disabled = false;
                btnActivate.textContent = 'Aktivasi Sekarang';
            }
        });

        // Global App Identity Loader
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const res = await fetch('/api/system/settings');
                const data = await res.json();
                if(data.success) {
                    document.title = document.title.split('-')[0].trim() + ' - ' + data.appName;
                    const brandH1 = document.querySelector('.sidebar-brand-h1');
                    const brandLogo = document.querySelector('.sidebar-brand-logo');
                    if(brandH1) brandH1.textContent = 'Aktivasi ' + data.appName;
                    if(brandLogo) {
                        if(data.appLogo.startsWith('http') || data.appLogo.startsWith('/') || data.appLogo.startsWith('data:image')) {
                            brandLogo.innerHTML = '<img src="' + data.appLogo + '" style="width:100%;height:100%;border-radius:8px;object-fit:cover;">';
                        } else {
                            brandLogo.textContent = data.appLogo;
                        }
                    }
                }
            } catch(e) {}
        });
    </script>
</body>
</html>
